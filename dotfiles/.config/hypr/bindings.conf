# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser
$fileManager = uwsm app -- nautilus

unbind = CTRL ALT, J

bindd = SUPER, return, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, return, Browser, exec, $browser --password-store=basic
bindd = SUPER, N, File manager, exec, $fileManager

# Close windows
bindd = SUPER SHIFT, Q, Close active window, killactive,

# Control tiling
bindd = SUPER, I, Toggle split, togglesplit, # dwindle
unbind = SUPER, T
bindd = SUPER SHIFT, F, Toggle floating, togglefloating,

# Move focus with SUPER + arrow keys
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, L, Move focus right, movefocus, r
unbind = SUPER, J
bindd = SUPER, J, Move focus up, movefocus, u
unbind = SUPER, K
bindd = SUPER, K, Move focus down, movefocus, d

# Tab between workspaces
bindd = SUPER, semicolon, Former workspace, workspace, previous

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, J, Swap window up, swapwindow, u
bindd = SUPER SHIFT, K, Swap window down, swapwindow, d

# Menus
bindd = SUPER, comma, Show key bindings, exec, omarchy-menu-keybindings

# Waybar
unbind = SUPER, W
binddrl = SUPER, SUPER_L, Toggle waybar, exec, omarchy-toggle-waybar

# Btop
windowrule = float on, border_size 2, size 1000 900, rounding 8, match:class (.*btop)
bindd = SUPER, B, Btop, exec, omarchy-launch-tui btop

# Opencode
unbind = SUPER, O
windowrule = float on, border_size 2, size 1500 1000, rounding 8, match:class (.*opencode)
bindd = SUPER, O, Btop, exec, omarchy-launch-tui /home/rabeta/.opencode/bin/opencode

# Clipse
windowrule = float on, border_size 2, size 875 700, rounding 8, match:class (.*clipse)
bindd = SUPER, C, Clipse, exec, omarchy-launch-tui clipse && /home/rabeta/.config/hypr/clipse.sh

# Always-nvim
windowrule = float on, border_size 2, size 1200 800, rounding 8, match:class (.*ghostty), match:title (.*always-nvim.*)
bindd = SUPER, E, Always-nvim, exec, always-nvim
