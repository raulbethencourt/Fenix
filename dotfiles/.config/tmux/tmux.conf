# -- general -------------------------------------------------------------------
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",*:RGB"
set -g default-command "${SHELL}"

setw -g xterm-keys on
set -s escape-time 0                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on
setw -g aggressive-resize on
set -g set-clipboard on
set -g detach-on-destroy off
set -g renumber-windows on
setw -g pane-base-index 1
set -g base-index 1
set -g mouse off

set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

set -q -g status-utf8 on                  # expect UTF-8 (tmux < 2.2)
setw -q -g utf8 on

set -g history-limit 100000                 # boost history

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

set -gq allow-passthrough on

# -- Env vars -------------------------------------------------------------------
set-environment -g SHELLTOOLSPATH ~/shelltools

# -- display -------------------------------------------------------------------
set-option -g status-position top
#set -wg pane-border-status on

set -g popup-border-style fg=white
set -g popup-border-lines rounded

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-interval 10     # redraw status line every 10 seconds

# clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# activity
set -g monitor-activity off
set -g visual-activity off

# theme everforest
set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#d3c6aa,bg=#141617"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#414b50"
set -g status-style "none,bg=#141617"
set -g message-style "fg=#d3c6aa,bg=#141617"
set -g pane-border-style "fg=#141617"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#d3c6aa,bg=#141617"
set -g status-left ""
set -g status-right "#[fg=#dbbc7f,bg=#141617,bold]󰀘 #S #[fg=#414b50,bg=#141617,nobold,nounderscore,noitalics]#[fg=#a7c080,bg=#141617,bold] %Y-%m-%d #[fg=#414b50,bg=#141617,nobold,nounderscore,noitalics] #[fg=#a7c080,bg=#141617,bold]%H:%M "
setw -g window-status-format "#[fg=#414b50,bg=#141617] #I#[fg=#414b50,bg=#141617] #W "
setw -g window-status-current-format "#[fg=#dbbc7f,bg=#141617,bold]󱐋#[fg=#a7c080,bg=#141617,bold] #I #W "

# -- navigation ----------------------------------------------------------------
# Create session
bind C-c new-session

# Navigate sessions
unbind & 
bind & switch-client -t c_code_beta
unbind é 
bind é switch-client -t r_remote
unbind \" 
bind \" switch-client -t k_vaults
unbind \' 
bind \' switch-client -t l_default
unbind ( 
bind ( switch-client -t j_config
unbind - 
bind - switch-client -t opencode 
unbind è 
bind è switch-client -t e_certif

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# maximize current pane
bind + run 'cut -c3- ~/.tmux.conf | sh -s _maximize_pane "#{session_name}" #D'

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
unbind n
unbind p
bind -r C-h previous-window # select previous window
bind -r C-l next-window     # select next window
bind Tab last-window        # move to last active window

# toggle mouse
bind m run "cut -c3- ~/.tmux.conf | sh -s _toggle_mouse"

# -- copy mode -----------------------------------------------------------------
bind Enter copy-mode # enter copy mode
setw -g mode-keys vi

run -b 'tmux bind -t vi-copy v begin-selection 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi v send -X begin-selection 2> /dev/null || true'
run -b 'tmux bind -t vi-copy C-v rectangle-toggle 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi C-v send -X rectangle-toggle 2> /dev/null || true'
run -b 'tmux bind -t vi-copy y copy-selection 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi y send -X copy-selection-and-cancel 2> /dev/null || true'
run -b 'tmux bind -t vi-copy Escape cancel 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi Escape send -X cancel 2> /dev/null || true'
run -b 'tmux bind -t vi-copy H start-of-line 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi H send -X start-of-line 2> /dev/null || true'
run -b 'tmux bind -t vi-copy L end-of-line 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi L send -X end-of-line 2> /dev/null || true'

# copy to X11 clipboard
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'
# copy to Wayland clipboard
if -b 'command -v wl-copy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | wl-copy"'

# -- buffers -------------------------------------------------------------------
bind p paste-buffer -p  # paste from the top paste buffer
bind P choose-buffer    # choose which buffer to paste from

# -- my bindings -------------------------------------------------------------------
bind o set-option status # tmux toggle statusline
bind b display-popup -E -h 95% -w 95% -x C -y C "btop"
bind u run-shell "current_path=\$(tmux display-message -p '#{pane_current_path}'); tmux display-popup -E -h 95% -w 95% -x C -y C -d \"\$current_path\" lazygit"
bind m display-popup -E -h 95% -w 90% -x C -y E "bash ~/shelltools/bin/fman"
bind f display-popup -E -h 95% -w 90% -x C -y E "bash ~/shelltools/bin/fcurl -d ~/restapi/ | jq -C | less -RF'"
bind n display-popup -E -h 30% -w 15% -x C -y C "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --bind=tab:up --bind=btab:down --bind=esc:close \
--info hidden --prompt '󰀘  ' --color fg:#ebdbb2,hl:#fabd2f,fg+:#ebdbb2,bg+:#3c3836,hl+:#fabd2f --margin 1 \
--color info:#83a598,prompt:#ea6962,spinner:#fabd2f,pointer:#83a598,marker:#fe8019,header:#665c54 | xargs tmux switch-client -t"

# aoe session - attach or create
bind a if-shell "tmux has-session -t agents" "switch-client -t agents" "new-session -d -s agents 'zsh -ci aoe'; switch-client -t agents"

bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind x kill-pane
unbind w
bind w kill-window

# -- plugins -------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'ddzero2c/tmux-easymotion'
set -g @easymotion-key 'j'
set -g @easymotion-case-sensitive 'false'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tmux-resurrect'
# for vim
set -g @resurrect-strategy-vim 'session'
# for neovim
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Tmux Navigator
set -g @plugin 'aserowy/tmux.nvim'
# navigation
set -g @tmux-nvim-navigation true
set -g @tmux-nvim-navigation-cycle true
set -g @tmux-nvim-navigation-keybinding-left 'C-h' 
set -g @tmux-nvim-navigation-keybinding-down 'C-j' 
set -g @tmux-nvim-navigation-keybinding-up 'C-k' 
set -g @tmux-nvim-navigation-keybinding-right 'C-l' 
# resize
set -g @tmux-nvim-resize true
set -g @tmux-nvim-resize-step-x 1
set -g @tmux-nvim-resize-step-y 1
set -g @tmux-nvim-resize-keybinding-left 'M-h' 
set -g @tmux-nvim-resize-keybinding-down 'M-j' 
set -g @tmux-nvim-resize-keybinding-up 'M-k' 
set -g @tmux-nvim-resize-keybinding-right 'M-l' 

run '~/.tmux/plugins/tpm/tpm'
