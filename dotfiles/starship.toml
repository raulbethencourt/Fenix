# Inserts a blank line between shell prompts
add_newline = false
scan_timeout = 10
format = "$all"

[username]
style_user = "yellow bold"
style_root = "black bold"
format = '\[[$user]($style)\] [´îť ](bold red) '
disabled = false
show_always = true

[cmd_duration]
min_time = 500
format = "[$duration](bold yellow) "

[character]
success_symbol = "[Ô×ť](bold green)" 
error_symbol = "[Ôťľ](bold red)" 

