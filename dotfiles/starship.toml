# Inserts a blank line between shell prompts
add_newline = false
scan_timeout = 10
format = "$all"

[username]
style_user = "yellow bold"
style_root = "black bold"
format = '\[[$user]($style)\]Ύ▓Ψ '
disabled = false
show_always = true

[cmd_duration]
min_time = 500
format = "[$duration](bold yellow) "

[character]
success_symbol = "[ΎΒκ](bold green)" 
error_symbol = "[έεΨ](bold red)" 

